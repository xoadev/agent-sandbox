name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: shellcheck
        run: shellcheck -x agent-sandbox.sh install.sh tests/run_tests.sh

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Run tests
        run: bash tests/run_tests.sh

  build-opencode:
    name: Build opencode container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            opencode:
              - 'containers/opencode/**'

      - name: Build Docker image
        if: steps.filter.outputs.opencode == 'true'
        run: docker build -t opencode:ci containers/opencode/
